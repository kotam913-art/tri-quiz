<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ロイロ用クイズ一覧</title>
<style>
  :root{
    --bg:#eef4ff;
    --card:#ffffff;
    --ink:#172033;
    --muted:#64748b;
    --line:#dbe4f0;
    --accent:#2563eb;
    --accent2:#1d4ed8;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    color:var(--ink);
    background:
      radial-gradient(circle at top left, rgba(37,99,235,.18), transparent 32rem),
      linear-gradient(180deg,#f8fbff 0%,var(--bg) 100%);
    min-height:100vh;
    padding:22px 16px 48px;
  }
  .wrap{max-width:920px;margin:0 auto}
  header{
    background:rgba(255,255,255,.9);
    border:1px solid var(--line);
    border-radius:24px;
    padding:22px;
    box-shadow:0 12px 32px rgba(15,23,42,.08);
    margin-bottom:18px;
  }
  .eyebrow{
    display:inline-flex;
    align-items:center;
    gap:8px;
    font-size:13px;
    font-weight:800;
    color:var(--accent2);
    background:#dbeafe;
    border:1px solid #bfdbfe;
    border-radius:999px;
    padding:6px 10px;
    margin-bottom:12px;
  }
  h1{font-size:clamp(26px,5vw,42px);line-height:1.15;margin:0 0 10px}
  .lead{color:var(--muted);line-height:1.75;margin:0;font-size:16px}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:14px;margin-top:16px}
  .card{
    display:flex;
    flex-direction:column;
    gap:12px;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:22px;
    padding:18px;
    box-shadow:0 10px 24px rgba(15,23,42,.07);
    text-decoration:none;
    color:inherit;
    transition:.15s transform,.15s box-shadow,.15s border-color;
  }
  .card:active{transform:scale(.99)}
  @media (hover:hover){.card:hover{transform:translateY(-2px);border-color:#93c5fd;box-shadow:0 16px 34px rgba(15,23,42,.11)}}
  .tag{width:max-content;background:#f1f5f9;color:#334155;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:800}
  .title{font-size:21px;font-weight:900;line-height:1.35}
  .desc{color:var(--muted);line-height:1.7;margin:0;font-size:14px}
  .meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:auto}
  .pill{font-size:12px;font-weight:800;color:#1e3a8a;background:#eff6ff;border:1px solid #bfdbfe;border-radius:999px;padding:5px 8px}
  .open{display:inline-flex;justify-content:center;align-items:center;margin-top:2px;background:var(--accent);color:#fff;border-radius:14px;padding:11px 12px;font-weight:900}
  .note{margin-top:18px;color:var(--muted);font-size:13px;line-height:1.7;text-align:center}
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="eyebrow">TAKASE / LOILO QUIZ</div>
      <h1>ロイロ用クイズ一覧</h1>
      <p class="lead">授業で使うWebクイズ置き場。カードを押すと、そのままクイズを開けます。</p>
    </header>

    <section class="grid" aria-label="クイズ一覧">
      <a class="card" href="trig-basic-2026.html">
        <span class="tag">数学 I</span>
        <div class="title">三角比 基礎クイズ</div>
        <p class="desc">三平方の定理、30°・45°・60°の直角三角形、sin・cos・tanの基本値を確認する即採点クイズ。</p>
        <div class="meta">
          <span class="pill">2026</span>
          <span class="pill">即採点</span>
          <span class="pill">√入力対応</span>
        </div>
        <span class="open">クイズを開く</span>
      </a>
    </section>

    <p class="note">今後は新しいクイズHTMLを追加して、この一覧にカードを増やしていきます。</p>
  </div>
</body>
</html>
