<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>三角比脳トレクイズ v3</title>
<style>
  :root {
    --ok:#14a44d;
    --ng:#d93025;
    --base:#1f2937;
    --accent:#2563eb;
    --paper:#fff;
    --soft:#eef4ff;
  }
  * { box-sizing: border-box; }
  body {
    margin:0;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: linear-gradient(180deg,#eaf2ff 0,#f8fafc 35%,#fff 100%);
    color:var(--base);
  }
  header {
    position: sticky;
    top:0;
    z-index:20;
    background: rgba(255,255,255,.94);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid #dbe4f0;
    padding: 10px 12px;
  }
  .bar {
    max-width: 980px;
    margin: 0 auto;
    display:flex;
    gap:10px;
    align-items:center;
    flex-wrap:wrap;
  }
  h1 {
    font-size: 18px;
    line-height: 1.2;
    margin:0 auto 0 0;
    font-weight:800;
  }
  .stat {
    font-weight:700;
    background:#f1f5f9;
    border:1px solid #dbe4f0;
    border-radius:999px;
    padding:8px 11px;
    white-space:nowrap;
  }
  button {
    appearance:none;
    border:0;
    border-radius:10px;
    padding:10px 14px;
    font-weight:800;
    cursor:pointer;
    background:var(--accent);
    color:white;
    box-shadow: 0 2px 7px rgba(37,99,235,.24);
  }
  button.secondary { background:#334155; }
  button.light { background:#fff; color:#1f2937; border:1px solid #cbd5e1; box-shadow:none; }
  main {
    max-width: 980px;
    margin: 16px auto 32px;
    padding: 0 10px;
  }
  .note {
    background:#fff;
    border:1px solid #dbe4f0;
    border-radius:16px;
    padding:12px 14px;
    margin-bottom:12px;
    line-height:1.6;
    box-shadow:0 4px 18px rgba(15,23,42,.06);
  }
  .toolrow { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
  .key {
    background:#f8fafc;
    color:#0f172a;
    border:1px solid #cbd5e1;
    border-radius:9px;
    padding:8px 12px;
    box-shadow:none;
  }
  .root-hint {
    margin-top:8px;
    font-weight:800;
    color:#1d4ed8;
  }
  .floating-pad {
    position: fixed;
    left: 50%;
    bottom: max(10px, env(safe-area-inset-bottom));
    transform: translateX(-50%);
    z-index: 30;
    display: flex;
    justify-content: center;
    padding: 7px;
    background: rgba(255,255,255,.95);
    border: 1px solid #cbd5e1;
    border-radius: 18px;
    box-shadow: 0 10px 28px rgba(15,23,42,.18);
    backdrop-filter: blur(10px);
  }
  .floating-pad .key {
    padding: 10px 18px;
    font-size: 22px;
    line-height: 1;
    min-width: 64px;
  }
  .sheet-wrap {
    background:white;
    border-radius:18px;
    padding:10px;
    border:1px solid #dbe4f0;
    box-shadow: 0 12px 34px rgba(15,23,42,.12);
    overflow:auto;
  }
  .sheet {
    position:relative;
    width:100%;
    max-width: 900px;
    margin:0 auto;
  }
  .sheet img { display:block; width:100%; height:auto; user-select:none; }
  .blank {
    position:absolute;
    transform: translate(-1px,-1px);
  }
  .blank input {
    width:100%;
    height:100%;
    border:3px solid rgba(37,99,235,.72);
    background:rgba(255,255,255,.92);
    border-radius:4px;
    text-align:center;
    font-weight:800;
    font-size: clamp(11px, 1.9vw, 24px);
    color:#111827;
    outline:none;
    padding:0 3px;
    box-shadow: 0 0 0 2px rgba(255,255,255,.75), 0 2px 8px rgba(0,0,0,.08);
  }
  .blank input:focus { border-color:#f59e0b; background:#fffceb; }
  .blank.ok input { border-color:var(--ok); background:rgba(236,253,245,.95); }
  .blank.ng input { border-color:var(--ng); background:rgba(254,242,242,.95); }
  .feedback {
    display:none;
    position:absolute;
    left:50%;
    top:100%;
    transform:translateX(-50%);
    margin-top:2px;
    font-size: clamp(9px, 1.45vw, 17px);
    line-height:1.1;
    white-space:nowrap;
    background:#111827;
    color:white;
    padding:3px 6px;
    border-radius:999px;
    z-index:5;
  }
  .blank.ng .feedback, .blank.ok .feedback { display:block; }
  .blank.ok .feedback { background:var(--ok); }
  .blank.ng .feedback { background:var(--ng); }
  .result {
    margin:12px 0;
    padding:14px;
    border-radius:14px;
    background:#fff;
    border:1px solid #dbe4f0;
    display:none;
    font-weight:800;
    line-height:1.6;
  }
  .result.show { display:block; }
  .confetti {
    position:fixed;
    inset:0;
    pointer-events:none;
    overflow:hidden;
    z-index:50;
  }
  .piece {
    position:absolute;
    width:8px; height:14px;
    opacity:.95;
    animation:fall 1200ms linear forwards;
  }
  @keyframes fall {
    from { transform:translateY(-30px) rotate(0deg); }
    to { transform:translateY(110vh) rotate(650deg); }
  }
  footer { max-width:980px; margin:0 auto 100px; padding:0 12px; color:#475569; font-size:13px; line-height:1.6; }
  @media (max-width: 620px) {
    h1 { font-size:15px; }
    .stat { padding:7px 9px; font-size:13px; }
    button { padding:9px 11px; }
    main { margin-top:8px; }
    .note { font-size:13px; }
    .sheet-wrap { padding:4px; border-radius:12px; }
  }
</style>
</head>
<body>
<header>
  <div class="bar">
    <h1>三角比脳トレクイズ</h1>
    <div class="stat" id="scorePill">未採点</div>
    <button id="gradeBtn">採点する</button>
    <button class="secondary" id="resetBtn">リセット</button>
  </div>
</header>
<main>
  <div class="note">
    <strong>使い方：</strong>□に答えを入力して「採点する」。<br>
    <strong>入力例：</strong>√3、√3/2、-√3/2、45°、小数も可。tan90° は「なし」「定義されない」などで正解。<br>
    <div class="root-hint">画面下の「√」を押してから、2・3・/2 などを入力。</div>
    <div class="toolrow" aria-label="入力補助">
      <button class="key" data-insert="√">√</button>
    </div>
  </div>
  <div class="result" id="resultBox"></div>
  <div class="sheet-wrap">

let lastFocused = null;
const sheet = document.getElementById('sheet');
const scorePill = document.getElementById('scorePill');
const resultBox = document.getElementById('resultBox');

function pct(n, total) { return (n / total * 100).toFixed(4) + '%'; }

function createInputs() {
  blanks.forEach((b, i) => {
    const d = document.createElement('div');
    d.className = 'blank';
    d.style.left = pct(b.x, W);
    d.style.top = pct(b.y, H);
    d.style.width = pct(b.w, W);
    d.style.height = pct(b.h, H);
    d.dataset.id = b.id;
    const inp = document.createElement('input');
    inp.type = 'text';
    inp.autocomplete = 'off';
    inp.autocapitalize = 'off';
    inp.spellcheck = false;
    inp.placeholder = '';
    inp.setAttribute('aria-label', '解答欄 ' + (i+1));
    inp.addEventListener('focus', () => lastFocused = inp);
    inp.addEventListener('input', () => { d.classList.remove('ok','ng'); updateAnswered(); });
    inp.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const inputs = [...document.querySelectorAll('.blank input')];
        const idx = inputs.indexOf(inp);
        if (idx < inputs.length - 1) inputs[idx+1].focus();
        else grade();
      }
    });
    const fb = document.createElement('span');
    fb.className = 'feedback';
    d.appendChild(inp);
    d.appendChild(fb);
    sheet.appendChild(d);
  });
}

function normalize(s) {
  return (s ?? '')
    .toString()
    .normalize('NFKC')
    .trim()
    .toLowerCase()
    .replace(/\s+/g,'')
    .replace(/[−－]/g,'-')
    .replace(/[×x]/g,'*')
    .replace(/[÷]/g,'/')
    .replace(/[°度]/g,'')
    .replace(/√\(([^()]*)\)/g,'sqrt($1)')
    .replace(/√([0-9.]+)/g,'sqrt($1)')
    .replace(/\b(?:root|rt|r)\(([^()]*)\)/g,'sqrt($1)')
    .replace(/\b(?:root|rt|r)([0-9.]+)/g,'sqrt($1)')
    .replace(/sqrt([0-9.]+)/g,'sqrt($1)')
    .replace(/√/g,'sqrt')
    .replace(/π/g,'pi');
}

function evalMath(raw) {
  let s = normalize(raw);
  if (!s) return null;
  // 「1√3」などを「1*sqrt(3)」にする最低限の補正
  s = s.replace(/(\d)\s*sqrt/g, '$1*sqrt');
  if (!/^[0-9+\-*/().sqrtpi]+$/.test(s)) return null;
  const js = s.replace(/sqrt/g,'Math.sqrt').replace(/pi/g,'Math.PI');
  try {
    const v = Function('"use strict"; return (' + js + ')')();
    return Number.isFinite(v) ? v : null;
  } catch { return null; }
}

function isNone(raw) {
  const s = (raw ?? '').toString().normalize('NFKC').trim().toLowerCase().replace(/\s+/g,'');
  return ['なし','ない','存在しない','定義されない','未定義','不可能','undefined','undef','dne','nan','×','x'].includes(s);
}

function check(b, raw) {
  if (b.kind === 'none') return isNone(raw);
  const v = evalMath(raw);
  if (v === null) return false;
  return Math.abs(v - b.value) <= 0.015;
}

function updateAnswered() {
  const answered = [...document.querySelectorAll('.blank input')].filter(i => i.value.trim()).length;
  scorePill.textContent = `${answered} / ${blanks.length} 入力済み`;
}

function grade() {
  let ok = 0;
  const wrongs = [];
  const nodes = [...document.querySelectorAll('.blank')];
  nodes.forEach((node, idx) => {
    const b = blanks[idx];
    const inp = node.querySelector('input');
    const fb = node.querySelector('.feedback');
    node.classList.remove('ok','ng');
    const good = check(b, inp.value);
    if (good) {
      ok++;
      node.classList.add('ok');
      fb.textContent = '○';
    } else {
      node.classList.add('ng');
      fb.textContent = '正: ' + b.ans;
      wrongs.push({num: idx + 1, ans: b.ans});
    }
  });
  const rate = Math.round(ok / blanks.length * 100);
  scorePill.textContent = `${ok} / ${blanks.length} 正解`;
  resultBox.classList.add('show');
  let msg = `結果：${ok} / ${blanks.length} 正解（${rate}%）`;
  if (ok === blanks.length) {
    msg += '<br>満点。三角比の型はかなり固い。';
    confetti();
  } else if (rate >= 80) {
    msg += '<br>かなり良い。赤のところだけ直せば完成。';
  } else if (rate >= 60) {
    msg += '<br>基本型は見えている。30°・45°・60°の辺の比を再確認。';
  } else {
    msg += '<br>まずは特別な直角三角形の辺の比から固める。';
  }
  resultBox.innerHTML = msg;
  window.scrollTo({top:0, behavior:'smooth'});
}

function resetAll() {
  document.querySelectorAll('.blank').forEach(d => {
    d.classList.remove('ok','ng');
    d.querySelector('input').value = '';
    d.querySelector('.feedback').textContent = '';
  });
  scorePill.textContent = '未採点';
  resultBox.classList.remove('show');
  resultBox.textContent = '';
}

function insertText(txt) {
  const inp = lastFocused || document.querySelector('.blank input');
  if (!inp) return;
  inp.focus();
  const start = inp.selectionStart ?? inp.value.length;
  const end = inp.selectionEnd ?? inp.value.length;
  inp.value = inp.value.slice(0,start) + txt + inp.value.slice(end);
  const pos = start + txt.length;
  inp.setSelectionRange(pos, pos);
  inp.dispatchEvent(new Event('input'));
}

function confetti() {
  const box = document.getElementById('confetti');
  box.innerHTML = '';
  const colors = ['#2563eb','#16a34a','#f59e0b','#ef4444','#8b5cf6'];
  for (let i=0;i<90;i++) {
    const p = document.createElement('div');
    p.className = 'piece';
    p.style.left = Math.random()*100 + 'vw';
    p.style.background = colors[i % colors.length];
    p.style.animationDelay = (Math.random()*250) + 'ms';
    p.style.animationDuration = (850 + Math.random()*900) + 'ms';
    box.appendChild(p);
  }
  setTimeout(() => box.innerHTML='', 2200);
}

document.getElementById('gradeBtn').addEventListener('click', grade);
document.getElementById('resetBtn').addEventListener('click', resetAll);
document.querySelectorAll('.key').forEach(btn => btn.addEventListener('click', () => insertText(btn.dataset.insert)));
createInputs();
