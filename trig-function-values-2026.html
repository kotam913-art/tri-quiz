<!doctype html>
<html lang='ja'>
<head>
<meta charset='utf-8'>
<meta name='viewport' content='width=device-width,initial-scale=1,viewport-fit=cover'>
<title>三角関数の値・思考ステップクイズ（5分）</title>
<style>
*{box-sizing:border-box}body{margin:0;padding:0 0 82px;font-family:system-ui,sans-serif;color:#172033;background:#eef4ff}button,input{font:inherit}.top{position:sticky;top:0;z-index:5;display:flex;justify-content:space-between;gap:10px;align-items:center;padding:12px 16px;background:#142e55;color:#fff}.top h1{margin:0;font-size:clamp(17px,3vw,24px)}.stats{display:flex;gap:6px}.pill{padding:7px 10px;border-radius:999px;background:#ffffff20;font-weight:900;white-space:nowrap}.timer{background:#fff7ed;color:#9a3412}.wrap{max-width:1080px;margin:auto;padding:16px}.guide,.card,.result{background:#fff;border:1px solid #dbe4f0;border-radius:18px;box-shadow:0 7px 22px #0f172a12}.guide{padding:16px;margin-bottom:14px}.guide h2{margin:0 0 6px}.flow{display:flex;flex-wrap:wrap;gap:6px}.flow span,.formula{padding:6px 9px;border-radius:999px;background:#eff6ff;color:#1e3a8a;font-weight:800}.formulas{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}.formula{display:flex;align-items:center;gap:5px}.mini,.frac{display:grid;grid-template-rows:auto 2px auto;text-align:center}.bar{height:2px;background:#172033}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.card{padding:14px}.head{display:flex;justify-content:space-between}.theta{font:900 25px 'Times New Roman',serif}.score{font-weight:900}.diagram{display:block;width:210px;max-width:100%;margin:6px auto}.axis{stroke:#475569}.circle{fill:#fff;stroke:#172033;stroke-width:2}.ray{stroke:#9f1239;stroke-width:3}.leg{stroke:#2563eb;stroke-dasharray:4 4}.step{margin-top:8px;padding:10px;border:1px solid #dbe4f0;border-radius:13px}.step.lock{opacity:.4;pointer-events:none}.st{display:flex;gap:6px;align-items:center;font-weight:900;margin-bottom:7px}.mark{margin-left:auto}.ok{color:#15803d}.ng{color:#b91c1c}.choices{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}.choices.three{grid-template-columns:repeat(3,1fr)}.choices.two{grid-template-columns:repeat(2,1fr)}.choice{padding:8px 3px;border:2px solid #cbd5e1;border-radius:9px;background:#fff;font-weight:800}.choice.sel{border-color:#2563eb;background:#eff6ff}.choice.correct{border-color:#22c55e;background:#f0fdf4}.choice.wrong{border-color:#ef4444;background:#fef2f2}.vals{display:grid;gap:8px}.row{display:grid;grid-template-columns:45px 1fr 22px;align-items:center;gap:7px}.fn{font:900 19px 'Times New Roman',serif}.frac{gap:3px}.frac input{width:100%;min-width:0;padding:6px;border:2px solid #cbd5e1;border-radius:8px;text-align:center;font-weight:900}.frac.good input{border-color:#22c55e;background:#f0fdf4}.frac.bad input{border-color:#ef4444;background:#fef2f2}.hint{display:none;margin-top:7px;padding:8px;border-radius:10px;background:#fffbeb}.hint.show{display:block}.hintbtn{margin-top:9px;padding:7px;border:1px solid #cbd5e1;border-radius:9px;background:#fff;font-weight:800}.result{display:none;margin-top:14px;padding:16px}.result.show{display:block}.big{font-size:30px;font-weight:1000;color:#1d4ed8}.actions{position:fixed;left:0;right:0;bottom:0;display:flex;justify-content:center;gap:8px;padding:10px;background:#fffffff2;border-top:1px solid #dbe4f0}.actions button,.start{padding:11px 16px;border:0;border-radius:11px;color:#fff;font-weight:900}.submit,.start{background:#2563eb}.reset{background:#334155}.keys{position:fixed;right:12px;bottom:67px;display:flex;gap:5px}.key{padding:8px 12px;border:1px solid #cbd5e1;border-radius:10px;background:#fff;font-size:20px;font-weight:900}.overlay{position:fixed;inset:0;z-index:20;display:grid;place-items:center;padding:18px;background:#0f172abd}.overlay.hide{display:none}.modal{max-width:520px;padding:22px;border-radius:20px;background:#fff}.modal h2{margin-top:0}.start{width:100%;font-size:18px}.back{display:inline-block;margin-top:14px;font-weight:900;color:#1d4ed8;text-decoration:none}@media(max-width:820px){.grid{grid-template-columns:1fr}.card{max-width:620px;margin:auto;width:100%}}@media(max-width:480px){.top{align-items:flex-start;padding:10px}.pill{font-size:12px;padding:6px}.wrap{padding:10px}.card{padding:11px}}
</style>
</head>
<body>
<header class='top'><h1>三角関数の値・思考ステップクイズ</h1><div class='stats'><span class='pill timer' id='timer'>05:00</span><span class='pill' id='progress'>0 / 21</span></div></header>
<main class='wrap'>
<section class='guide'><h2>順番に考えよう</h2><p>象限 → 基準角 → x・yの符号 → 三角関数の値。sin・cos・tanは、分子と分母を上下の欄に入力してください。整数は分母を1にします。</p><div class='flow'><span>① 象限</span><span>② 基準角</span><span>③ 符号</span><span>④ 値</span></div><div class='formulas'><span class='formula'>sin θ = <span class='mini'><b>y</b><i class='bar'></i><b>r</b></span></span><span class='formula'>cos θ = <span class='mini'><b>x</b><i class='bar'></i><b>r</b></span></span><span class='formula'>tan θ = <span class='mini'><b>y</b><i class='bar'></i><b>x</b></span></span></div></section>
<section class='grid' id='grid'></section>
<section class='result' id='result'><h2>採点結果</h2><div class='big' id='total'>0 / 21</div><p id='message'></p></section>
<a class='back' href='index.html'>← クイズ一覧へ戻る</a>
</main>
<div class='keys'><button class='key' data-add='−'>−</button><button class='key' data-add='√'>√</button></div>
<div class='actions'><button class='submit' id='submit'>提出して採点</button><button class='reset' id='reset'>リセット</button></div>
<div class='overlay' id='overlay'><div class='modal'><h2>5分チャレンジ</h2><p>各問題を4段階で進めます。sin・cos・tanは分数の形で、上に分子、下に分母を入力してください。</p><button class='start' id='start'>スタート</button></div></div>
<script>
const Q=[
{id:'p1',angle:225,theta:'5π/4',q:'3',ref:'45',x:'-',y:'-',sin:-Math.SQRT1_2,cos:-Math.SQRT1_2,tan:1,hint:'5π/4 = π + π/4。πからさらにπ/4進んだ位置です。',ph:[['−√2','2'],['−√2','2'],['1','1']]},
{id:'p2',angle:330,theta:'11π/6',q:'4',ref:'30',x:'+',y:'-',sin:-.5,cos:Math.sqrt(3)/2,tan:-Math.sqrt(3)/3,hint:'11π/6 = 2π − π/6。1周する直前の位置です。',ph:[['−1','2'],['√3','2'],['−√3','3']]},
{id:'p3',angle:300,theta:'−π/3',q:'4',ref:'60',x:'+',y:'-',sin:-Math.sqrt(3)/2,cos:.5,tan:-Math.sqrt(3),hint:'負の角は時計回り。正のx軸から60°下の位置です。',ph:[['−√3','2'],['1','2'],['−√3','1']]}
];
const KEY='tri-quiz:trig-function-values-2026:v3',LIMIT=300,$=s=>document.querySelector(s),grid=$('#grid'),timer=$('#timer'),progress=$('#progress'),overlay=$('#overlay'),submit=$('#submit'),reset=$('#reset'),result=$('#result');let state={},startAt=0,timerId,locked=false,active=null;
function fs(id){return state[id]||(state[id]={})}function vf(s,f){return s[f]&&typeof s[f]=='object'?s[f]:(s[f]={n:'',d:''})}function save(){try{localStorage.setItem(KEY+':state',JSON.stringify(state))}catch(e){}}function store(k,v){try{localStorage.setItem(KEY+k,v)}catch(e){}}function get(k,d=''){try{return localStorage.getItem(KEY+k)||d}catch(e){return d}}function clear(){try{[':state',':start',':done'].forEach(k=>localStorage.removeItem(KEY+k))}catch(e){}}
function term(v){v=String(v||'').trim().replaceAll('−','-').replaceAll('－','-').replaceAll(' ','');if(!v)return NaN;let sign=1;if(v[0]=='-'){sign=-1;v=v.slice(1)}if(v[0]=='+')v=v.slice(1);if(v.includes('√')){const p=v.split('√');const c=p[0]?Number(p[0]):1,r=Number(p[1]);return Number.isFinite(c)&&Number.isFinite(r)?sign*c*Math.sqrt(r):NaN}const n=Number(v);return Number.isFinite(n)?sign*n:NaN}
function val(n,d){n=term(n);d=term(d);return Number.isFinite(n)&&Number.isFinite(d)&&d!=0?n/d:NaN}
function card(q,i){const frac=(f,j)=>`<label class='row'><span class='fn'>${f}</span><span class='frac' data-f='${f}'><input data-p='n' placeholder='${q.ph[j][0]}' aria-label='${f}の分子'><i class='bar'></i><input data-p='d' placeholder='${q.ph[j][1]}' aria-label='${f}の分母'></span><span class='mark'></span></label>`;return `<article class='card' data-id='${q.id}'><div class='head'><div><b>問題 ${i+1}</b><div class='theta'>θ = ${q.theta}</div></div><span class='score'>— / 7</span></div><svg class='diagram' viewBox='0 0 240 240'></svg><div class='step' data-s='1'><div class='st'>STEP 1　終辺は第何象限？<span class='mark'></span></div><div class='choices'>${[1,2,3,4].map(x=>`<button class='choice' data-f='q' data-v='${x}'>第${x}</button>`).join('')}</div></div><div class='step lock' data-s='2'><div class='st'>STEP 2　基準角は？<span class='mark'></span></div><div class='choices three'>${[30,45,60].map(x=>`<button class='choice' data-f='ref' data-v='${x}'>${x}°</button>`).join('')}</div></div><div class='step lock' data-s='3'><div class='st'>STEP 3　x・yの符号は？<span class='mark'></span></div><div class='choices two'><button class='choice' data-f='x' data-v='+'>x＋</button><button class='choice' data-f='x' data-v='-'>x−</button><button class='choice' data-f='y' data-v='+'>y＋</button><button class='choice' data-f='y' data-v='-'>y−</button></div></div><div class='step lock' data-s='4'><div class='st'>STEP 4　sin・cos・tan<span class='mark'></span></div><div class='vals'>${frac('sin',0)}${frac('cos',1)}${frac('tan',2)}</div></div><button class='hintbtn'>考え方のヒント</button><div class='hint'>${q.hint}</div></article>`}
function draw(c,a){const s=c.querySelector('svg'),r=88,cx=120,cy=120,t=a*Math.PI/180,x=cx+r*Math.cos(t),y=cy-r*Math.sin(t);s.innerHTML=`<circle class='circle' cx='${cx}' cy='${cy}' r='${r}'/><line class='axis' x1='15' y1='${cy}' x2='225' y2='${cy}'/><line class='axis' x1='${cx}' y1='15' x2='${cx}' y2='225'/><line class='ray' x1='${cx}' y1='${cy}' x2='${x}' y2='${y}'/><line class='leg' x1='${x}' y1='${y}' x2='${x}' y2='${cy}'/>`}
function render(c){const s=fs(c.dataset.id);c.querySelectorAll('.choice').forEach(b=>b.classList.toggle('sel',s[b.dataset.f]==b.dataset.v));c.querySelector('[data-s="2"]').classList.toggle('lock',!s.q);c.querySelector('[data-s="3"]').classList.toggle('lock',!s.ref);c.querySelector('[data-s="4"]').classList.toggle('lock',!(s.x&&s.y));c.querySelectorAll('.frac').forEach(w=>{const f=vf(s,w.dataset.f);w.querySelectorAll('input').forEach(x=>{if(document.activeElement!=x)x.value=f[x.dataset.p]||''})})}
function count(){let n=0;Q.forEach(q=>{const s=fs(q.id);['q','ref','x','y'].forEach(f=>{if(s[f])n++});['sin','cos','tan'].forEach(f=>{const z=vf(s,f);if(z.n&&z.d)n++})});progress.textContent=n+' / 21'}
function choice(c,f,a,step){const s=fs(c.dataset.id),sel=s[f]||'';c.querySelectorAll(`.choice[data-f='${f}']`).forEach(b=>{b.classList.remove('correct','wrong');if(b.dataset.v==a)b.classList.add('correct');if(b.dataset.v==sel&&sel!=a)b.classList.add('wrong')});const ok=sel==a,m=c.querySelector(`[data-s='${step}'] .mark`);m.textContent=ok?'○':'×';m.className='mark '+(ok?'ok':'ng');return ok?1:0}
function fraction(c,f,a){const w=c.querySelector(`.frac[data-f='${f}']`),x=w.querySelectorAll('input'),ok=Number.isFinite(val(x[0].value,x[1].value))&&Math.abs(val(x[0].value,x[1].value)-a)<1e-6;w.classList.toggle('good',ok);w.classList.toggle('bad',!ok);const m=w.parentElement.querySelector('.mark');m.textContent=ok?'○':'×';m.className='mark '+(ok?'ok':'ng');return ok?1:0}
function grade(){let total=0;Q.forEach(q=>{const c=document.querySelector(`[data-id='${q.id}']`),a=choice(c,'q',q.q,1),b=choice(c,'ref',q.ref,2),x=choice(c,'x',q.x,3),y=choice(c,'y',q.y,3),s=fraction(c,'sin',q.sin),co=fraction(c,'cos',q.cos),t=fraction(c,'tan',q.tan),sum=a+b+x+y+s+co+t;total+=sum;c.querySelector('.score').textContent=sum+' / 7';const m3=c.querySelector('[data-s="3"] .mark');m3.textContent=x+y==2?'○':'×';m3.className='mark '+(x+y==2?'ok':'ng');const m4=c.querySelector('[data-s="4"] .mark');m4.textContent=s+co+t==3?'○':'×';m4.className='mark '+(s+co+t==3?'ok':'ng')});$('#total').textContent=total+' / 21';$('#message').textContent=total==21?'全問正解です。':total>=17?'かなり理解できています。':total>=11?'赤くなった段階を確認しましょう。':'象限と基準角から見直しましょう。';result.classList.add('show')}
function lock(v){locked=v;document.querySelectorAll('.choice,.frac input,.key').forEach(x=>x.disabled=v);submit.disabled=v;reset.textContent=v?'リセットしてもう一回':'リセット'}function left(){return Math.max(0,LIMIT-Math.floor((Date.now()-startAt)/1000))}function tick(){const s=left();timer.textContent=String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');if(!s)finish('timeout')}function run(){clearInterval(timerId);tick();timerId=setInterval(tick,250)}function finish(r){if(locked||!startAt)return;clearInterval(timerId);save();store(':done',r);grade();lock(true);if(r=='timeout')timer.textContent='00:00';result.scrollIntoView({behavior:'smooth'})}
function resetAll(){clearInterval(timerId);clear();state={};startAt=0;locked=false;active=null;result.classList.remove('show');document.querySelectorAll('.correct,.wrong,.good,.bad,.ok,.ng').forEach(x=>x.classList.remove('correct','wrong','good','bad','ok','ng'));document.querySelectorAll('.mark').forEach(x=>x.textContent='');document.querySelectorAll('.score').forEach(x=>x.textContent='— / 7');document.querySelectorAll('.card').forEach(render);count();timer.textContent='05:00';lock(false);submit.disabled=true;overlay.classList.remove('hide');scrollTo({top:0,behavior:'smooth'})}
grid.innerHTML=Q.map(card).join('');document.querySelectorAll('.card').forEach((c,i)=>{draw(c,Q[i].angle);c.querySelectorAll('.choice').forEach(b=>b.onclick=()=>{if(locked)return;fs(c.dataset.id)[b.dataset.f]=b.dataset.v;save();render(c);count()});c.querySelectorAll('.frac input').forEach(x=>{x.onfocus=()=>active=x;x.oninput=()=>{const w=x.closest('.frac'),z=vf(fs(c.dataset.id),w.dataset.f);z[x.dataset.p]=x.value;save();count()}});c.querySelector('.hintbtn').onclick=()=>c.querySelector('.hint').classList.toggle('show')});document.querySelectorAll('.key').forEach(b=>b.onclick=()=>{if(!active||locked)return;active.value+=b.dataset.add;active.dispatchEvent(new Event('input'));active.focus()});$('#start').onclick=()=>{startAt=Date.now();store(':start',startAt);overlay.classList.add('hide');lock(false);run()};submit.onclick=()=>finish('done');reset.onclick=resetAll;
try{state=JSON.parse(get(':state','{}'))||{}}catch(e){state={}}document.querySelectorAll('.card').forEach(render);count();startAt=Number(get(':start','0'));const done=get(':done');if(startAt){overlay.classList.add('hide');if(done){grade();lock(true)}else if(left()<=0)finish('timeout');else{lock(false);run()}}else{lock(false);submit.disabled=true}
</script>
</body>
</html>
