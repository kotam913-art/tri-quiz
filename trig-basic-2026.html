<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>三角比 基礎クイズ 2026（5分制限）</title>
<style>
  body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#eef4ff;color:#172033;display:grid;place-items:center;min-height:100vh;padding:24px}
  .box{max-width:720px;background:#fff;border:1px solid #dbe4f0;border-radius:20px;padding:24px;box-shadow:0 10px 30px rgba(15,23,42,.08)}
  h1{margin:0 0 12px;font-size:24px}.muted{color:#64748b;line-height:1.7}.err{color:#b91c1c;font-weight:800}.btn{display:inline-block;margin-top:14px;background:#2563eb;color:#fff;text-decoration:none;font-weight:800;padding:12px 16px;border-radius:12px}
</style>
</head>
<body>
<main class="box" id="loading">
  <h1>三角比 基礎クイズ 2026</h1>
  <p class="muted">5分タイマーつきクイズを読み込んでいます。</p>
</main>
<script>
const SOURCE_URL = 'https://raw.githack.com/kotam913-art/tri-quiz/5ab25cbca673d45bd1879f4d0d9d95a969dca6fc/index.html';

const TIMER_CSS = `
  .stat.timer {
    background:#fff7ed;
    border-color:#fed7aa;
    color:#9a3412;
    font-variant-numeric: tabular-nums;
    min-width:82px;
    text-align:center;
  }
  .stat.timer.danger {
    background:#fee2e2;
    border-color:#fecaca;
    color:#991b1b;
  }
  button:disabled {
    opacity:.5;
    cursor:not-allowed;
    box-shadow:none;
  }
  .blank input:disabled {
    background:#f1f5f9;
    color:#475569;
    -webkit-text-fill-color:#475569;
    opacity:1;
  }
  .timed-status {
    display:block;
    margin-top:10px;
    font-weight:900;
  }
`;

const TIMED_JS = `
const QUIZ_TIME_LIMIT_SECONDS = 300;
const QUIZ_STORAGE_KEY = 'tri-quiz:trig-basic-2026:timer-v2';
let quizTimerId = null;
let quizLocked = false;
let quizStartAt = 0;

const timerPill = document.getElementById('timerPill');
const originalGrade = grade;
const originalResetAll = resetAll;
const gradeBtn = document.getElementById('gradeBtn');
const resetBtn = document.getElementById('resetBtn');

function timerInputs() {
  return [...document.querySelectorAll('.blank input')];
}

function storageGet(key, fallback = null) {
  try { return localStorage.getItem(key) ?? fallback; } catch (e) { return fallback; }
}

function storageSet(key, value) {
  try { localStorage.setItem(key, value); } catch (e) {}
}

function storageRemove(key) {
  try { localStorage.removeItem(key); } catch (e) {}
}

function clearQuizStorage() {
  storageRemove(QUIZ_STORAGE_KEY + ':startAt');
  storageRemove(QUIZ_STORAGE_KEY + ':answers');
  storageRemove(QUIZ_STORAGE_KEY + ':finished');
}

function formatSeconds(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}

function ensureStartAt() {
  quizStartAt = Number(storageGet(QUIZ_STORAGE_KEY + ':startAt', '0')) || 0;
  if (!quizStartAt) {
    quizStartAt = Date.now();
    storageSet(QUIZ_STORAGE_KEY + ':startAt', String(quizStartAt));
  }
}

function secondsLeft() {
  return Math.max(0, QUIZ_TIME_LIMIT_SECONDS - Math.floor((Date.now() - quizStartAt) / 1000));
}

function renderTimer() {
  const left = secondsLeft();
  timerPill.textContent = formatSeconds(left);
  timerPill.classList.toggle('danger', left <= 60);
  return left;
}

function saveAnswers() {
  const values = timerInputs().map(input => input.value);
  storageSet(QUIZ_STORAGE_KEY + ':answers', JSON.stringify(values));
}

function restoreAnswers() {
  try {
    const values = JSON.parse(storageGet(QUIZ_STORAGE_KEY + ':answers', '[]'));
    timerInputs().forEach((input, i) => {
      if (values[i] != null) input.value = values[i];
    });
    updateAnswered();
  } catch (e) {}
}

function removeTimedStatus() {
  const old = document.getElementById('timedStatus');
  if (old) old.remove();
}

function appendTimedStatus(reason) {
  removeTimedStatus();
  const span = document.createElement('span');
  span.id = 'timedStatus';
  span.className = 'timed-status';
  span.textContent = reason === 'timeout'
    ? '時間切れ。自動採点しました。もう一度やる場合は「リセット」を押してください。'
    : '提出済み。もう一度やる場合は「リセット」を押してください。';
  resultBox.appendChild(span);
}

function setInputsLocked(locked) {
  timerInputs().forEach(input => input.disabled = locked);
  document.querySelectorAll('.key').forEach(btn => btn.disabled = locked);
  gradeBtn.disabled = locked;
  resetBtn.disabled = false;
}

function setQuizLocked(reason) {
  setInputsLocked(true);
  timerPill.textContent = '00:00';
  timerPill.classList.add('danger');
  resetBtn.textContent = 'リセットしてもう一回';
  appendTimedStatus(reason);
}

function finishTimedQuiz(reason) {
  if (quizLocked) return;
  quizLocked = true;
  clearInterval(quizTimerId);
  saveAnswers();
  storageSet(QUIZ_STORAGE_KEY + ':finished', reason || 'submitted');
  originalGrade();
  setQuizLocked(reason);
}

grade = function() {
  finishTimedQuiz('submitted');
};

function startTimer() {
  clearInterval(quizTimerId);
  ensureStartAt();
  if (renderTimer() <= 0) {
    finishTimedQuiz('timeout');
    return;
  }
  quizTimerId = setInterval(() => {
    if (renderTimer() <= 0) finishTimedQuiz('timeout');
  }, 250);
}

resetAll = function() {
  clearInterval(quizTimerId);
  quizLocked = false;
  clearQuizStorage();
  removeTimedStatus();
  setInputsLocked(false);
  resetBtn.textContent = 'リセット';
  timerPill.classList.remove('danger');
  originalResetAll();
  ensureStartAt();
  renderTimer();
  startTimer();
  const first = timerInputs()[0];
  if (first) first.focus();
};

function initTimedQuiz() {
  timerInputs().forEach(input => input.addEventListener('input', saveAnswers));
  ensureStartAt();
  restoreAnswers();

  const finishedReason = storageGet(QUIZ_STORAGE_KEY + ':finished', '');
  if (finishedReason) {
    originalGrade();
    quizLocked = true;
    setQuizLocked(finishedReason);
    return;
  }

  startTimer();
}
`;

const EVENT_BLOCK = `document.getElementById('gradeBtn').addEventListener('click', grade);
document.getElementById('resetBtn').addEventListener('click', resetAll);
document.querySelectorAll('.key').forEach(btn => btn.addEventListener('click', () => insertText(btn.dataset.insert)));
createInputs();`;

function patchHtml(html) {
  let out = html;
  out = out.replace('<title>三角比脳トレクイズ v3</title>', '<title>三角比 基礎クイズ 2026（5分制限）</title>');
  out = out.replace('</style>', TIMER_CSS + '\n</style>');
  out = out.replace('<h1>三角比脳トレクイズ</h1>', '<h1>三角比 基礎クイズ</h1>');
  out = out.replace('<div class="stat" id="scorePill">未採点</div>', '<div class="stat timer" id="timerPill">05:00</div>\n    <div class="stat" id="scorePill">未採点</div>');
  out = out.replace('<button id="gradeBtn">採点する</button>', '<button id="gradeBtn">提出して採点</button>');
  out = out.replace('<strong>使い方：</strong>□に答えを入力して「採点する」。<br>', '<strong>使い方：</strong>□に答えを入力して、5分以内に「提出して採点」。時間切れで自動採点し、入力をロックします。もう一度やる場合はリセットできます。<br>');
  out = out.replace(EVENT_BLOCK, TIMED_JS + '\n' + EVENT_BLOCK.replace('createInputs();', 'createInputs();\ninitTimedQuiz();'));
  return out;
}

async function boot() {
  try {
    const res = await fetch(SOURCE_URL, { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const html = await res.text();
    document.open();
    document.write(patchHtml(html));
    document.close();
  } catch (e) {
    document.getElementById('loading').innerHTML = '<h1>読み込みエラー</h1><p class="err">クイズを読み込めませんでした。</p><p class="muted">通信状況を確認して、もう一度開いてください。</p><a class="btn" href="' + SOURCE_URL + '">タイマーなし版を開く</a>';
  }
}

boot();
</script>
</body>
</html>
