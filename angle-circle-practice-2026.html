<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>角度・弧度法・単位円クイズ（5分）</title>
<style>
body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#eef4ff;color:#172033;display:grid;place-items:center;min-height:100vh;padding:24px}.box{max-width:720px;background:#fff;border:1px solid #dbe4f0;border-radius:20px;padding:24px;box-shadow:0 10px 30px rgba(15,23,42,.08)}h1{margin:0 0 12px;font-size:24px}.muted{color:#64748b;line-height:1.7}.err{color:#b91c1c;font-weight:800}.btn{display:inline-block;margin-top:14px;background:#2563eb;color:#fff;text-decoration:none;font-weight:800;padding:12px 16px;border-radius:12px}
</style>
</head>
<body>
<main class="box" id="loading"><h1>角度・弧度法・単位円クイズ</h1><p class="muted">角度線を表示したクイズを読み込んでいます。</p></main>
<script>
const SOURCE_URL='https://raw.githack.com/kotam913-art/tri-quiz/9e2e0538401df9bae9f6db70751b726361ce5099/angle-circle-practice-2026.html';

const EXTRA_CSS=`
.refrow{margin-bottom:3px}.refs{align-items:center}.ref{display:flex;justify-content:center;align-items:center;min-height:30px;color:#1d4ed8;font-size:14px;font-weight:900;background:#eff6ff;border:1px solid #bfdbfe;border-radius:999px}.frac-answer{display:grid;grid-template-columns:minmax(42px,1fr) auto;grid-template-rows:auto auto;align-items:center;justify-content:center;column-gap:4px}.frac{grid-row:1;display:grid;grid-template-rows:1fr 2px 1fr;align-items:center;justify-items:stretch;min-width:42px}.frac input{width:100%;min-width:0;border:2px solid #cbd5e1;border-radius:8px;text-align:center;padding:5px 2px;font-size:17px;font-weight:900;background:#fff}.frac input:focus{outline:3px solid #bfdbfe;border-color:#2563eb}.frac .bar{height:2px;background:#172033;margin:2px 1px}.frac-answer .pi{grid-column:2;grid-row:1;font-family:"Times New Roman",serif;font-size:24px;font-weight:900}.frac-answer .mark{grid-column:1/3;grid-row:2}.frac-answer.ok .frac input{border-color:#22c55e;background:#f0fdf4;color:#166534}.frac-answer.ng .frac input{border-color:#ef4444;background:#fef2f2;color:#991b1b}.frac input:disabled{opacity:1;-webkit-text-fill-color:currentColor}.inputwrap{align-items:start}.keypad{display:none!important}.circleactions{display:none!important}.quiz-circle{pointer-events:none}.circletitle span{font-weight:900;color:#1d4ed8!important}
@media(max-width:760px){.ref{font-size:13px}.frac input{font-size:16px;padding:5px 1px}.frac-answer .pi{font-size:22px}}
`;

const FRACTIONS={
  '0.6666666667':[2,3],
  '0.75':[3,4],
  '0.8333333333':[5,6],
  '1.1666666667':[7,6],
  '1.25':[5,4],
  '1.3333333333':[4,3],
  '1.6666666667':[5,3],
  '1.75':[7,4],
  '1.8333333333':[11,6]
};

function fracMarkup(n,d){
  return '<label class="frac-answer" data-num="'+n+'" data-den="'+d+'"><span class="frac"><input class="frac-num" inputmode="numeric" aria-label="分子"><span class="bar"></span><input class="frac-den" inputmode="numeric" aria-label="分母"></span><span class="pi">π</span><span class="mark"></span></label>';
}

function addReferenceRows(out){
  out=out.replace('<div class="row"><div class="label">度数法</div><div class="inputs"><div class="given">30°</div><div class="given">45°</div><div class="given">60°</div></div></div>','<div class="row refrow"><div class="label">基準角</div><div class="inputs refs"><div class="ref">（30°）</div><div class="ref">（45°）</div><div class="ref">（60°）</div></div></div><div class="row"><div class="label">度数法</div><div class="inputs"><div class="given">30°</div><div class="given">45°</div><div class="given">60°</div></div></div>');
  out=out.replace('<div class="row"><div class="label">度数法</div><div class="inputs"><div class="given">120°</div><div class="given">135°</div><div class="given">150°</div></div></div>','<div class="row refrow"><div class="label">基準角</div><div class="inputs refs"><div class="ref">（60°）</div><div class="ref">（45°）</div><div class="ref">（30°）</div></div></div><div class="row"><div class="label">度数法</div><div class="inputs"><div class="given">120°</div><div class="given">135°</div><div class="given">150°</div></div></div>');
  out=out.replace('<div class="row"><div class="label">度数法</div><div class="inputs"><label><input class="answer deg" data-answer="210"','<div class="row refrow"><div class="label">基準角</div><div class="inputs refs"><div class="ref">（30°）</div><div class="ref">（45°）</div><div class="ref">（60°）</div></div></div><div class="row"><div class="label">度数法</div><div class="inputs"><label><input class="answer deg" data-answer="210"');
  out=out.replace('<div class="row"><div class="label">度数法</div><div class="inputs"><label><input class="answer deg" data-answer="300"','<div class="row refrow"><div class="label">基準角</div><div class="inputs refs"><div class="ref">（60°）</div><div class="ref">（45°）</div><div class="ref">（30°）</div></div></div><div class="row"><div class="label">度数法</div><div class="inputs"><label><input class="answer deg" data-answer="300"');
  return out;
}

function patchHtml(html){
  let out=html;
  out=out.replace('</style>',EXTRA_CSS+'\n</style>');
  out=out.replace("const LIMIT=300, KEY='tri-quiz:angle-circle-2026:v1', TOL=7;","const LIMIT=300, KEY='tri-quiz:angle-circle-2026:v5', TOL=12;");
  out=out.replace('空欄を埋め、単位円は<strong>円周上を3か所タップ</strong>して半直線を作ります。入力順は小さい角から。第1象限は見本、第2象限の度数法はヒントです。','<strong>基準角（30°・45°・60°）は、どの象限でも同じ三角形</strong>です。角度の線は最初から表示してあります。度数法を確認し、弧度法は分子・分母だけ入力してください。πは最初から表示されています。');
  out=out.replace('<div class="overlay" id="overlay"><div class="modal"><h2>5分チャレンジ</h2><p>「スタート」を押すと5分タイマーが始まります。弧度法の入力では、画面右下の <strong>π</strong> と <strong>／</strong> ボタンも使えます。</p>','<div class="overlay" id="overlay"><div class="modal"><h2>5分チャレンジ</h2><p>「スタート」を押すと5分タイマーが始まります。角度の線は表示済みです。弧度法は、表示されたπの前にある分数の<strong>分子と分母だけ</strong>入力してください。</p>');
  out=addReferenceRows(out);
  out=out.replace(/<label><input class="answer rad" data-answer="([^"]+)"[^>]*><span class="mark"><\/span><\/label>/g,(m,a)=>{const f=FRACTIONS[a];return f?fracMarkup(f[0],f[1]):m});
  out=out.replace('<div class="keypad"><button class="key" type="button" data-insert="π">π</button><button class="key" type="button" data-insert="/">／</button></div>','');
  out=out.replace('<strong>120°・135°・150°を作図</strong><span>円周をタップ</span>','<strong>角度の線</strong><span>表示済み</span>');
  out=out.replace('<strong>210°・225°・240°を作図</strong><span>円周をタップ</span>','<strong>角度の線</strong><span>表示済み</span>');
  out=out.replace('<strong>300°・315°・330°を作図</strong><span>円周をタップ</span>','<strong>角度の線</strong><span>表示済み</span>');
  out=out.replace('<div class="pill" id="progress">0 / 24</div>','<div class="pill" id="progress">0 / 15</div>');
  out=out.replace('<div class="scorebig" id="scorebig">0 / 24</div>','<div class="scorebig" id="scorebig">0 / 15</div>');
  out=out.replace("const inputs=[...document.querySelectorAll('.answer')];","const inputs=[...document.querySelectorAll('.answer')],fracAnswers=[...document.querySelectorAll('.frac-answer')],fracInputs=[...document.querySelectorAll('.frac-num,.frac-den')];");
  out=out.replace("function initQuizCircles(){document.querySelectorAll('.quiz-circle').forEach(svg=>{const q=svg.dataset.q,targets=svg.dataset.targets.split(',').map(Number);circles[q]={svg,targets,rays:[],graded:false};renderCircle(q);svg.addEventListener('pointerdown',e=>tapCircle(e,q));svg.closest('.circlebox').querySelector('.undo').addEventListener('click',()=>undoRay(q))})}","function initQuizCircles(){document.querySelectorAll('.quiz-circle').forEach(svg=>{const q=svg.dataset.q,targets=svg.dataset.targets.split(',').map(Number);circles[q]={svg,targets,rays:targets.slice(),graded:false};renderCircle(q)})}");
  out=out.replace("function updateProgress(){const filled=inputs.filter(i=>i.value.trim()).length;const rays=Object.values(circles).reduce((s,c)=>s+c.rays.length,0);progressEl.textContent=(filled+rays)+' / 24'}","function updateProgress(){const filled=inputs.filter(i=>i.value.trim()).length+fracAnswers.filter(f=>f.querySelector('.frac-num').value.trim()&&f.querySelector('.frac-den').value.trim()).length;progressEl.textContent=filled+' / 15'}");
  out=out.replace("function save(){ss(':answers',JSON.stringify(inputs.map(i=>i.value)));ss(':rays',JSON.stringify(Object.fromEntries(Object.entries(circles).map(([q,c])=>[q,c.rays]))))}","function save(){ss(':answers',JSON.stringify({deg:inputs.map(i=>i.value),frac:fracAnswers.map(f=>[f.querySelector('.frac-num').value,f.querySelector('.frac-den').value])}))}");
  out=out.replace("function restore(){try{const a=JSON.parse(sg(':answers','[]'));inputs.forEach((i,n)=>{if(a[n]!=null)i.value=a[n]});const r=JSON.parse(sg(':rays','{}'));Object.entries(r).forEach(([q,v])=>{if(circles[q])circles[q].rays=Array.isArray(v)?v:[]})}catch(e){}Object.keys(circles).forEach(q=>renderCircle(q));updateProgress()}","function restore(){try{const a=JSON.parse(sg(':answers','{}'));(a.deg||[]).forEach((v,n)=>{if(inputs[n])inputs[n].value=v});(a.frac||[]).forEach((v,n)=>{if(fracAnswers[n]){fracAnswers[n].querySelector('.frac-num').value=v[0]||'';fracAnswers[n].querySelector('.frac-den').value=v[1]||''}})}catch(e){}Object.values(circles).forEach(c=>c.rays=c.targets.slice());Object.keys(circles).forEach(q=>renderCircle(q));updateProgress()}");
  out=out.replace("function setLocked(v){locked=v;inputs.forEach(i=>i.disabled=v);document.querySelectorAll('.key').forEach(b=>b.disabled=v);submitBtn.disabled=v;document.querySelectorAll('.undo').forEach(b=>b.disabled=v||!circles[b.closest('.circlebox').querySelector('svg').dataset.q].rays.length);resetBtn.textContent=v?'リセットしてもう一回':'リセット'}","function setLocked(v){locked=v;inputs.forEach(i=>i.disabled=v);fracInputs.forEach(i=>i.disabled=v);submitBtn.disabled=v;document.querySelectorAll('.undo').forEach(b=>b.disabled=true);resetBtn.textContent=v?'リセットしてもう一回':'リセット'}");
  out=out.replace("function gradeInput(i){const val=i.classList.contains('deg')?parseDeg(i.value):parsePi(i.value),ans=Number(i.dataset.answer),ok=Number.isFinite(val)&&Math.abs(val-ans)<1e-4;i.classList.toggle('ok',ok);i.classList.toggle('ng',!ok);const m=i.parentElement.querySelector('.mark');m.textContent=ok?'○':'×';m.className='mark '+(ok?'ok':'ng');return ok?1:0}","function gradeInput(i){const val=parseDeg(i.value),ans=Number(i.dataset.answer),ok=Number.isFinite(val)&&Math.abs(val-ans)<1e-4;i.classList.toggle('ok',ok);i.classList.toggle('ng',!ok);const m=i.parentElement.querySelector('.mark');m.textContent=ok?'○':'×';m.className='mark '+(ok?'ok':'ng');return ok?1:0}function gradeFrac(f){const n=Number(norm(f.querySelector('.frac-num').value)),d=Number(norm(f.querySelector('.frac-den').value)),an=Number(f.dataset.num),ad=Number(f.dataset.den),ok=Number.isFinite(n)&&Number.isFinite(d)&&d!==0&&Math.abs(n/d-an/ad)<1e-6;f.classList.toggle('ok',ok);f.classList.toggle('ng',!ok);const m=f.querySelector('.mark');m.textContent=ok?'○':'×';m.className='mark '+(ok?'ok':'ng');return ok?1:0}");
  out=out.replace("function finish(reason){if(locked)return;clearInterval(timerId);save();ss(':finished',reason);let score=inputs.reduce((s,i)=>s+gradeInput(i),0);Object.keys(circles).forEach(q=>{score+=circleScore(circles[q]);renderCircle(q,true)});scorebig.textContent=score+' / 24';message.textContent=reason==='timeout'?'時間切れで自動採点しました。':'提出して採点しました。';result.classList.add('show');setLocked(true);timerEl.textContent=reason==='timeout'?'00:00':fmt(secondsLeft());result.scrollIntoView({behavior:'smooth',block:'center'})}","function finish(reason){if(locked)return;clearInterval(timerId);save();ss(':finished',reason);let score=inputs.reduce((s,i)=>s+gradeInput(i),0)+fracAnswers.reduce((s,f)=>s+gradeFrac(f),0);scorebig.textContent=score+' / 15';message.textContent=reason==='timeout'?'時間切れで自動採点しました。':'提出して採点しました。';result.classList.add('show');setLocked(true);timerEl.textContent=reason==='timeout'?'00:00':fmt(secondsLeft());result.scrollIntoView({behavior:'smooth',block:'center'})}");
  out=out.replace("function resetQuiz(){clearInterval(timerId);clearStore();locked=false;attemptStarted=false;startedAt=0;inputs.forEach(i=>{i.value='';i.classList.remove('ok','ng');const m=i.parentElement.querySelector('.mark');m.textContent='';m.className='mark'});Object.values(circles).forEach(c=>c.rays=[]);Object.keys(circles).forEach(q=>renderCircle(q));result.classList.remove('show');timerEl.textContent='05:00';timerEl.classList.remove('danger');progressEl.textContent='0 / 24';setLocked(false);overlay.classList.remove('hidden')}","function resetQuiz(){clearInterval(timerId);clearStore();locked=false;attemptStarted=false;startedAt=0;inputs.forEach(i=>{i.value='';i.classList.remove('ok','ng');const m=i.parentElement.querySelector('.mark');m.textContent='';m.className='mark'});fracAnswers.forEach(f=>{f.classList.remove('ok','ng');f.querySelectorAll('input').forEach(i=>i.value='');const m=f.querySelector('.mark');m.textContent='';m.className='mark'});Object.values(circles).forEach(c=>c.rays=c.targets.slice());Object.keys(circles).forEach(q=>renderCircle(q));result.classList.remove('show');scorebig.textContent='0 / 15';message.textContent='';timerEl.textContent='05:00';timerEl.classList.remove('danger');progressEl.textContent='0 / 15';setLocked(false);overlay.classList.remove('hidden')}");
  out=out.replace("function begin(){attemptStarted=true;startedAt=Date.now();ss(':start',String(startedAt));overlay.classList.add('hidden');setLocked(false);startTimer();inputs[0].focus()}","function begin(){attemptStarted=true;startedAt=Date.now();ss(':start',String(startedAt));overlay.classList.add('hidden');setLocked(false);startTimer();const first=document.querySelector('.frac-num,.answer');if(first)first.focus()}");
  out=out.replace("inputs.forEach(i=>{i.addEventListener('focus',()=>activeInput=i);i.addEventListener('input',()=>{save();updateProgress()})});document.querySelectorAll('.key').forEach(b=>b.addEventListener('click',()=>{if(!activeInput||locked)return;const t=b.dataset.insert,s=activeInput.selectionStart??activeInput.value.length,e=activeInput.selectionEnd??s;activeInput.value=activeInput.value.slice(0,s)+t+activeInput.value.slice(e);activeInput.selectionStart=activeInput.selectionEnd=s+t.length;activeInput.focus();save();updateProgress()}));","inputs.concat(fracInputs).forEach(i=>{i.addEventListener('focus',()=>activeInput=i);i.addEventListener('input',()=>{save();updateProgress()})});");
  out=out.replace("const storedStart=Number(sg(':start','0')),finished=sg(':finished','');if(storedStart){attemptStarted=true;startedAt=storedStart;overlay.classList.add('hidden');if(finished){let score=inputs.reduce((s,i)=>s+gradeInput(i),0);Object.keys(circles).forEach(q=>{score+=circleScore(circles[q]);renderCircle(q,true)});scorebig.textContent=score+' / 24';message.textContent=finished==='timeout'?'時間切れで自動採点しました。':'提出済みです。';result.classList.add('show');setLocked(true);timerEl.textContent=finished==='timeout'?'00:00':fmt(secondsLeft())}else if(secondsLeft()<=0){finish('timeout')}else startTimer()}else{setLocked(false);submitBtn.disabled=true;document.querySelectorAll('.undo').forEach(b=>b.disabled=true)}","const storedStart=Number(sg(':start','0')),finished=sg(':finished','');if(storedStart){attemptStarted=true;startedAt=storedStart;overlay.classList.add('hidden');if(finished){let score=inputs.reduce((s,i)=>s+gradeInput(i),0)+fracAnswers.reduce((s,f)=>s+gradeFrac(f),0);scorebig.textContent=score+' / 15';message.textContent=finished==='timeout'?'時間切れで自動採点しました。':'提出済みです。';result.classList.add('show');setLocked(true);timerEl.textContent=finished==='timeout'?'00:00':fmt(secondsLeft())}else if(secondsLeft()<=0){finish('timeout')}else startTimer()}else{setLocked(false);submitBtn.disabled=true;document.querySelectorAll('.undo').forEach(b=>b.disabled=true)}");
  return out;
}

async function boot(){
  try{
    const res=await fetch(SOURCE_URL,{cache:'no-store'});
    if(!res.ok)throw new Error('HTTP '+res.status);
    const html=await res.text();
    document.open();document.write(patchHtml(html));document.close();
  }catch(e){
    document.getElementById('loading').innerHTML='<h1>読み込みエラー</h1><p class="err">クイズを読み込めませんでした。</p><p class="muted">通信状況を確認して、もう一度開いてください。</p><a class="btn" href="'+SOURCE_URL+'">旧版を開く</a>';
  }
}
boot();
</script>
</body>
</html>
